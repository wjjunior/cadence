name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Typecheck, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  integration:
    name: Integration tests (Postgres)
    # The fast gate must pass before paying for the Dockerized Postgres run.
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Integration tests spin a throwaway Postgres via Testcontainers (Docker is
      # preinstalled on ubuntu-latest) and run migrations in their own beforeAll.
      - run: pnpm test:integration
