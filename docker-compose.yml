services:
  postgres:
    image: postgres:16
    container_name: cadence-postgres
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    # Bound to loopback only — never exposed beyond localhost. Host port 5433
    # avoids colliding with a Postgres already running on the default 5432.
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - cadence-pgdata:/var/lib/postgresql/data
    # -h 127.0.0.1 forces a TCP check so the probe only reports healthy once the
    # real server is listening, not during the init-phase bootstrap server that
    # only accepts the Unix socket (avoids a fresh-volume race with db:migrate).
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cadence -d cadence -h 127.0.0.1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # One-shot: applies migrations once, then exits. api and worker wait for it to
  # complete so neither serves against an unmigrated schema.
  migrate:
    build: .
    image: cadence
    command: ['node', 'dist/infrastructure/db/migrate.js']
    environment:
      DATABASE_URL: postgresql://cadence:cadence@postgres:5432/cadence
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build: .
    image: cadence
    command: ['node', 'dist/entrypoints/api.js']
    environment:
      DATABASE_URL: postgresql://cadence:cadence@postgres:5432/cadence
      LOG_LEVEL: info
    # Loopback-only; mock SMS is the zero-config default, so no secrets here.
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    image: cadence
    command: ['node', 'dist/entrypoints/worker.js']
    environment:
      DATABASE_URL: postgresql://cadence:cadence@postgres:5432/cadence
      LOG_LEVEL: info
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  cadence-pgdata:
